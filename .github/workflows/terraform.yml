name: Terraform + Ansible CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_VAR_public_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}

    steps:

    # =========================
    # 1. Checkout
    # =========================
    - name: Checkout
      uses: actions/checkout@v3

    # =========================
    # 2. GCP Auth
    # =========================
    - name: Auth GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/920722724682/locations/global/workloadIdentityPools/git1/providers/github
        service_account: gitlab-terraform@project-edd33288-581c-43ae-985.iam.gserviceaccount.com

    # =========================
    # 3. Terraform Setup
    # =========================
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false

    # =========================
    # 4. Install tools
    # =========================
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ansible jq netcat-openbsd

    # =========================
    # 5. Extract VM IPs (CLEAN + SAFE)
    # =========================
    - name: Get VM IPs
      id: ips
      run: |
        set -e

        IPS=$(terraform output -json vm_ips | jq -r '.[]')

        if [ -z "$IPS" ]; then
          echo "ERROR: No IPs found"
          exit 1
        fi

        echo "IPS<<EOF" >> $GITHUB_OUTPUT
        echo "$IPS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    # =========================
    # 6. SSH Setup (clean)
    # =========================
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        echo "${{ steps.ips.outputs.IPS }}" | while read ip; do
          ssh-keyscan -H "$ip" >> ~/.ssh/known_hosts
        done

    # =========================
    # 7. Wait for SSH (NO sleep blind)
    # =========================
    - name: Wait for SSH
      run: |
        echo "${{ steps.ips.outputs.IPS }}" | while read ip; do
          echo "Waiting SSH on $ip"

          for i in {1..30}; do
            nc -z "$ip" 22 && echo "$ip READY" && break
            sleep 5
          done
        done

    # =========================
    # 8. Build Ansible inventory (CLEAN)
    # =========================
    - name: Build Inventory
      run: |
        mkdir -p inventory
        echo "[vm]" > inventory/hosts.ini

        echo "${{ steps.ips.outputs.IPS }}" | while read ip; do
          echo "$ip ansible_user=ubuntu ansible_host=$ip" >> inventory/hosts.ini
        done

        echo "===== INVENTORY ====="
        cat inventory/hosts.ini

    # =========================
    # 9. Run Ansible
    # =========================
    - name: Run Ansible
      run: ansible-playbook -i inventory/hosts.ini playbook.yml
