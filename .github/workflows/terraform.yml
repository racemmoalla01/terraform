name: Terraform + Ansible CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_VAR_public_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}

    steps:

    # =========================
    # 1. CHECKOUT CODE
    # =========================
    - name: Checkout
      uses: actions/checkout@v3

    # =========================
    # 2. GCP AUTH (WIF)
    # =========================
    - name: Auth GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/920722724682/locations/global/workloadIdentityPools/git1/providers/github'
        service_account: 'gitlab-terraform@project-edd33288-581c-43ae-985.iam.gserviceaccount.com'

    # =========================
    # 3. TERRAFORM SETUP
    # =========================
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -input=false

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false

    # =========================
    # 4. GET CLEAN IP (SINGLE SOURCE OF TRUTH)
    # =========================
    - name: Get VM IP
      id: ip
      run: |
        IP=$(terraform output -raw vm_ip | tr -d '\r\n')
        echo "IP=$IP" >> $GITHUB_OUTPUT

    - name: Debug IP
      run: echo "VM IP = ${{ steps.ip.outputs.IP }}"

    # =========================
    # 5. SSH SETUP
    # =========================
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        ssh-keyscan -H ${{ steps.ip.outputs.IP }} >> ~/.ssh/known_hosts

    # =========================
    # 6. WAIT FOR SSH (HEALTH CHECK)
    # =========================
    - name: Wait for SSH
      run: |
        IP=${{ steps.ip.outputs.IP }}

        echo "Waiting for SSH on $IP..."

        for i in {1..30}; do
          nc -z $IP 22 && echo "SSH READY" && exit 0
          echo "waiting..."
          sleep 5
        done

        echo "SSH not ready" && exit 1

    # =========================
    # 7. INSTALL ANSIBLE
    # =========================
    - name: Install Ansible
      run: |
        sudo apt-get update
        sudo apt-get install -y ansible

    # =========================
    # 8. CREATE CLEAN INVENTORY
    # =========================
    - name: Build Inventory
      run: |
        IP=${{ steps.ip.outputs.IP }}

        mkdir -p inventory

        cat <<EOF > inventory/hosts.ini
        [vm]
        $IP ansible_user=ubuntu ansible_host=$IP
        EOF

        echo "===== INVENTORY ====="
        cat inventory/hosts.ini

    # =========================
    # 9. RUN ANSIBLE
    # =========================
    - name: Run Ansible
      run: ansible-playbook -i inventory/hosts.ini playbook.yml
