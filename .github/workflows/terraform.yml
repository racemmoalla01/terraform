name: Terraform + Ansible CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_VAR_public_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}

    steps:

    # =========================
    # 1. CHECKOUT
    # =========================
    - name: Checkout
      uses: actions/checkout@v3

    # =========================
    # 2. AUTH GCP
    # =========================
    - name: Auth GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/920722724682/locations/global/workloadIdentityPools/git1/providers/github'
        service_account: 'gitlab-terraform@project-edd33288-581c-43ae-985.iam.gserviceaccount.com'

    # =========================
    # 3. TERRAFORM
    # =========================
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false

    # =========================
    # 4. INSTALL TOOLS
    # =========================
    - name: Install Ansible
      run: |
        sudo apt-get update
        sudo apt-get install -y ansible netcat-openbsd

    # =========================
    # 5. GET CLEAN IPs (FIX FINAL PROPRE)
    # =========================
    - name: Build Inventory
      run: |
        set -e

        echo "Fetching Terraform JSON output..."

        # 🔥 STRICT CLEAN OUTPUT
        RAW=$(terraform output -json vm_ips 2>/dev/null | tail -n 1)

        echo "RAW JSON:"
        echo "$RAW"

        # 🔥 SAFE PARSING WITHOUT JQ (python minimal)
        IPS=$(echo "$RAW" | python3 -c "
import sys, json
data=json.load(sys.stdin)
print('\n'.join(data))
")

        echo "Parsed IPs:"
        echo "$IPS"

        # =========================
        # BUILD INVENTORY CLEAN
        # =========================
        mkdir -p inventory
        echo "[vm]" > inventory/hosts.ini

        echo "$IPS" | while read ip; do
          echo "$ip ansible_user=ubuntu ansible_host=$ip" >> inventory/hosts.ini
        done

        echo "===== FINAL INVENTORY ====="
        cat inventory/hosts.ini

    # =========================
    # 6. SSH SETUP
    # =========================
    - name: Setup SSH
      run: |
        set -e

        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}' inventory/hosts.ini | while read ip; do
          ssh-keyscan -H "$ip" >> ~/.ssh/known_hosts
        done

    # =========================
    # 7. WAIT SSH
    # =========================
    - name: Wait for SSH
      run: |
        grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}' inventory/hosts.ini | while read ip; do
          echo "Waiting SSH on $ip..."

          for i in {1..30}; do
            nc -z $ip 22 && echo "$ip READY" && break
            sleep 5
          done
        done

    # =========================
    # 8. RUN ANSIBLE
    # =========================
    - name: Run Ansible
      run: ansible-playbook -i inventory/hosts.ini playbook.yml
