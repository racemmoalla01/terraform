name: Terraform + Ansible CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_VAR_public_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}

    steps:

    # =========================
    # 1. CHECKOUT
    # =========================
    - name: Checkout
      uses: actions/checkout@v3

    # =========================
    # 2. GCP AUTH (WIF)
    # =========================
    - name: Auth GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/920722724682/locations/global/workloadIdentityPools/git1/providers/github'
        service_account: 'gitlab-terraform@project-edd33288-581c-43ae-985.iam.gserviceaccount.com'

    # =========================
    # 3. TERRAFORM
    # =========================
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -input=false

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false

    # =========================
    # 4. INSTALL ANSIBLE
    # =========================
    - name: Install Ansible
      run: |
        sudo apt-get update
        sudo apt-get install -y ansible

    # =========================
    # 5. BUILD INVENTORY (MULTI-VM SAFE)
    # =========================
    - name: Build Inventory
      run: |
        set -e

        echo "Fetching VM IPs..."

        IPS=$(terraform output -json vm_ips)

        echo "Raw output:"
        echo "$IPS"

        IP_LIST=$(echo "$IPS" | tr -d '[],"' | tr ' ' '\n' | grep -E '([0-9]{1,3}\.){3}[0-9]{1,3}')

        echo "Parsed IPs:"
        echo "$IP_LIST"

        mkdir -p inventory

        {
          echo "[vm]"
          for ip in $IP_LIST; do
            echo "$ip ansible_user=ubuntu ansible_host=$ip"
          done
        } > inventory/hosts.ini

        echo "===== INVENTORY ====="
        cat inventory/hosts.ini

    # =========================
    # 6. SSH SETUP
    # =========================
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh

        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        # add all hosts to known_hosts
        for ip in $(cat inventory/hosts.ini | grep -v '\[vm\]'); do
          ssh-keyscan -H "$ip" >> ~/.ssh/known_hosts
        done

    # =========================
    # 7. WAIT SSH HEALTH CHECK
    # =========================
    - name: Wait for SSH
      run: |
        for ip in $(cat inventory/hosts.ini | grep -v '\[vm\]'); do
          echo "Waiting SSH on $ip..."

          for i in {1..30}; do
            nc -z $ip 22 && echo "$ip READY" && break
            echo "waiting..."
            sleep 5
          done
        done

    # =========================
    # 8. RUN ANSIBLE
    # =========================
    - name: Run Ansible
      run: ansible-playbook -i inventory/hosts.ini playbook.yml
