name: 'Terraform'

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  id-token: 'write'

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    env:
      TF_VAR_public_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}


    defaults:
      run:
        shell: bash

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v3

    - id: auth
      uses: google-github-actions/auth@v2.0.0  
      with:
        workload_identity_provider: 'projects/920722724682/locations/global/workloadIdentityPools/git1/providers/github'
        service_account: 'gitlab-terraform@project-edd33288-581c-43ae-985.iam.gserviceaccount.com'


          
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}


    - name: Terraform Init
      run: terraform init


    # Generates an execution plan for Terraform
    - name: Terraform Plan
      run: terraform plan -input=false


    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false
   
    - name: Get VM IP
      id: ip
      run: |
        IP=$(terraform output -raw vm_ip | tr -d '\r\n')
        echo "IP=$IP" >> $GITHUB_OUTPUT
    
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: Wait for VM
      run: sleep 30

    - name: Install Ansible
      run: sudo apt-get update && sudo apt-get install -y ansible

    - name: Create clean inventory
      run: |
        IP=$(terraform output -raw vm_ip | tr -d '\r\n')

        echo "VM IP = $IP"

        rm -f inventory

        printf "[vm]\n%s ansible_user=ubuntu ansible_host=%s\n" "$IP" "$IP" > inventory

        echo "=== INVENTORY ==="
        cat inventory

    - name: Run Ansible
      run: ansible-playbook -i inventory playbook.yml
