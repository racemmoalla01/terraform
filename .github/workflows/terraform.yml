name: Terraform + Ansible CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_VAR_public_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}

    steps:

    # =========================
    # 1. CHECKOUT
    # =========================
    - name: Checkout
      uses: actions/checkout@v3

    # =========================
    # 2. GCP AUTH
    # =========================
    - name: Auth GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/920722724682/locations/global/workloadIdentityPools/git1/providers/github'
        service_account: 'gitlab-terraform@project-edd33288-581c-43ae-985.iam.gserviceaccount.com'

    # =========================
    # 3. TERRAFORM SETUP
    # =========================
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false

    # =========================
    # 4. EXPORT CLEAN JSON (IMPORTANT FIX)
    # =========================
    - name: Export Terraform Outputs
      run: |
        terraform output -json vm_ips > vm_ips.json
        cat vm_ips.json

    # =========================
    # 5. PARSE IPs PROPREMENT
    # =========================
    - name: Parse IPs
      id: ips
      run: |
        set -e

        CLEAN_IPS=$(python3 -c "import json; print('\n'.join(json.load(open('vm_ips.json'))))")

        echo "CLEAN IPS:"
        echo "$CLEAN_IPS"

        echo "IPS<<EOF" >> $GITHUB_OUTPUT
        echo "$CLEAN_IPS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    # =========================
    # 6. SSH SETUP
    # =========================
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh

        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        while read ip; do
          ssh-keyscan -H "$ip" >> ~/.ssh/known_hosts
        done <<< "${{ steps.ips.outputs.IPS }}"

    # =========================
    # 7. WAIT FOR SSH (HEALTH CHECK)
    # =========================
    - name: Wait for SSH
      run: |
        while read ip; do
          echo "Waiting SSH on $ip..."

          for i in {1..30}; do
            nc -z $ip 22 && echo "$ip READY" && break
            sleep 5
          done
        done <<< "${{ steps.ips.outputs.IPS }}"

    # =========================
    # 8. INSTALL ANSIBLE
    # =========================
    - name: Install Ansible
      run: |
        sudo apt-get update
        sudo apt-get install -y ansible

    # =========================
    # 9. BUILD CLEAN INVENTORY
    # =========================
    - name: Build Inventory
      run: |
        mkdir -p inventory
        echo "[vm]" > inventory/hosts.ini

        while read ip; do
          echo "$ip ansible_user=ubuntu ansible_host=$ip" >> inventory/hosts.ini
        done <<< "${{ steps.ips.outputs.IPS }}"

        echo "===== INVENTORY ====="
        cat inventory/hosts.ini

    # =========================
    # 10. RUN ANSIBLE
    # =========================
    - name: Run Ansible
      run: ansible-playbook -i inventory/hosts.ini playbook.yml
