- hosts: all
  become: yes

  tasks:

    - name: Update apt
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true
    - name: Add ubuntu to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
    - name: Run nginx
      shell: docker run -d -p 80:80 nginx
